env = BROWSER, chromium
env = PROGIT, file
env = FILEMANAGER, dolphin
env = TERMINAL yazi
env = EDITOR nvim
# 
# Open Alacritty terminal
bind = SUPER, Return, exec, alacritty
# Opeb Browser terminal
bind = SUPER, b, exec, $BROWSER
# Close the active window
bind = SUPER, Q, killactive,
# Отваряне на главната страница на Notion (SUPER + N)
bind = SUPER, N, exec, bash -c "$BROWSER https://notion.so"

# Отваряне на книгата ProGit (SUPER + P)
bind = SUPER, P, exec, bash -c "$BROWSER file:///home/martin/Documents/books/progit.pdf"

# Отваряне на файловия мениджър Nautilus (SUPER + E)
bind = SUPER, E, exec, $TERMINAL yazi .
bind = SUPER SHIFT, E, exec, $FILEMANAGER


bindd = SUPER SHIFT, SPACE, Omarchy menu, exec, omarchy-menu
bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-launch-walker

# Move focus with SUPER + Vim keys
bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, k, movefocus, u
bind = SUPER, j, movefocus, d

# Move active window with SUPER + SHIFT + Vim keys
bind = SUPER SHIFT, h, movewindow, l
bind = SUPER SHIFT, l, movewindow, r
bind = SUPER SHIFT, k, movewindow, u
bind = SUPER SHIFT, j, movewindow, d


# Reload Hyprland configuration
bind = SUPER, Tab, exec, hyprctl reload

#
# Switch workspaces with SUPER + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# Move active window to a workspace with SUPER + SHIFT + [0-9]
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10


# Toggle the current window into a group
bind = SUPER, g, togglegroup,

# Lock a group so it moves as a single solid unit
bind = SUPER SHIFT, g, lockactivegroup, toggle

# Move the entire group container using Vim motions
bind = SUPER CTRL SHIFT, h, movewindoworgroup, l
bind = SUPER CTRL SHIFT, l, movewindoworgroup, r
bind = SUPER CTRL SHIFT, k, movewindoworgroup, u
bind = SUPER CTRL SHIFT, j, movewindoworgroup, d


bind = SUPER CTRL, l, changegroupactive, f
bind = SUPER CTRL, h, changegroupactive, b

general {
    # Gaps between adjacent windows
    gaps_in = 0

    # Gaps between windows and monitor borders
    gaps_out = 0

    # Remove window borders completely if you want a seamless look
    border_size = 1
      col.active_border = rgb(909090)
    col.inactive_border = rgba(595959aa)
}

decoration {
    # Active window opacity (1.0 = 100% solid)
    active_opacity = 1.0

    # Inactive window opacity (0.8 = 80% visible / 20% transparent)
    inactive_opacity = 0.95

    # Optional: Keep fullscreen windows 100% solid for better focus
    fullscreen_opacity = 1.0
}


animations {
    enabled = true

    # Define a fast bezier curve for snappy window opening
    bezier = superFast, 0.1, 1, 0.1, 1

    # Minimize window open/close animations (very short duration)
    animation = windows, 1, 2, superFast, slide

    # Disable workspace switching animations completely
    animation = workspaces, 0, 1, default
}


# Toggle the current window into a stacked/tabbed group
bind = SUPER, s, togglegroup,

# Cycle through the stacked windows using Vim keys (SUPER + Control)
bind = SUPER CTRL, h, changegroupactive, b
bind = SUPER CTRL, l, changegroupactive, f



# --- ХОРИЗОНТАЛНО ОРАЗМЕРЯВАНЕ (Ширина) ---
# Увеличаване на ширината (SUPER + +)
binde = SUPER, equal, resizeactive, 20 0
# Намаляване на ширината (SUPER + -)
binde = SUPER, minus, resizeactive, -20 0

# --- ВЕРТИКАЛНО ОРАЗМЕРЯВАНЕ (Височина) ---
# Увеличаване на височината (SUPER + SHIFT + +)
binde = SUPER SHIFT, equal, resizeactive, 0 20
# Намаляване на височината (SUPER + SHIFT + -)
binde = SUPER SHIFT, minus, resizeactive, 0 -20


# Преместване на прозорец с SUPER + Ляв бутон на мишката
bindm = SUPER, mouse:272, movewindow

# Оразмеряване на прозорец с SUPER + Десен бутон на мишката
bindm = SUPER, mouse:273, resizewindow


# Увеличаване и намаляване на ШИРИНАТА (Хоризонтално)
# Увеличаване на ширината (SUPER + /)
binde = SUPER, slash, resizeactive, 30 0
# Намаляване на ширината (SUPER + ALT + /) -> Опционално, за баланс
binde = SUPER ALT, slash, resizeactive, -30 0

# Увеличаване и намаляване на ВИСОЧИНАТА (Вертикално)
# Увеличаване на височината (SUPER + SHIFT + /)
binde = SUPER SHIFT, slash, resizeactive, 0 30
# Намаляване на височината (SUPER SHIFT ALT, /) -> Опционално, за баланс
binde = SUPER SHIFT ALT, slash, resizeactive, 0 -30

monitor=eDP-1,disable
monitor=DP-1,preferred,auto,1
